{% extends "layout.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Analyse d'Image</h2>
    <p style="color: #666; margin-bottom: 2rem;">Veuillez remplir les informations du patient et charger une image de la lésion.</p>

    <form action="/predict" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Nom du patient</label>
            <input type="text" id="name" name="name" required placeholder="Nom complet">
        </div>

        <div class="form-group">
            <label for="age">Âge</label>
            <input type="number" id="age" name="age" required placeholder="Âge en années">
        </div>

        <div class="form-group">
            <label for="image">Image de la lésion (Format JPG, PNG)</label>
            <input type="file" id="image" name="image" accept="image/*" required>
        </div>

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Lancer l'Analyse IA</button>
        </div>
    </form>
</div>
{% endblock %}
