{% extends "layout.html" %}

{% block content %}
<div class="login-container">
    <div class="card login-card">
        <h1 style="text-align: center; margin-bottom: 2rem;">DermScan AI</h1>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">Veuillez vous connecter pour accéder à la plateforme.</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required placeholder="Ex: admin">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Se connecter</button>
        </form>
    </div>
</div>

<style>
    /* Override container for full-screen login */
    .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
    footer { display: none; }
</style>
{% endblock %}
